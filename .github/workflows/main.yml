name: Electron Windows Release

on:
  push:
    branches:
      - main  # Jab bhi aap main branch me kuch save karenge ye chalega

permissions:
  contents: write  # GitHub ko release generate karne ki ijazat deta hai

jobs:
  build:
    runs-on: windows-latest  # Windows ki virtual machine par build banegi

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Project Dependencies
        run: npm install

      - name: Build Electron Executable (.exe)
        run: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload and Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Electron App Release v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            dist/*.exe
            out/make/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
