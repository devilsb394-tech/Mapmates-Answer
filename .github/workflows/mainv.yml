name: Electron Windows Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 24  # Isse purani warning bhi khatam ho jayegi

      - name: Install Project Dependencies
        run: npm install

      - name: Build Electron Executable (.exe)
        # Aapki package.json ki sahi build command yahan laga di hai
        run: npm run build:win
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload and Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Electron App Release v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
          # Aapke output directory "release" ke mutabiq files ka path theek kar diya hai
          files: |
            release/*.exe
            release/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
